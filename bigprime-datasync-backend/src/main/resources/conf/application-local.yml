# 本地开发环境配置
# 用于覆盖默认的application.yml配置

# 服务器配置
server:
  port: 8080

# Spring配置
spring:
  # 应用名称
  application:
    name: bigprime-datasync
  
  # 静态资源配置 - 支持外部static目录
  web:
    resources:
      static-locations:
        - file:${BACKEND_HOME:${APP_HOME:.}/backend}/static/  # 外部static目录（优先级最高）
        - classpath:/static/           # 类路径static目录
  
  # 数据源配置（根据实际环境修改）
  datasource:
    url: jdbc:mysql://localhost:3306/bigprime_datasync?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      # 连接最大生命周期 25 分钟（小于 MySQL wait_timeout 默认 8 小时，强制回收避免陈旧连接）
      max-lifetime: 1500000
      # 空闲连接超时 10 分钟
      idle-timeout: 600000
      # 每隔 2 分钟发送一次 keepalive 心跳，防止连接被服务端静默关闭
      keepalive-time: 120000
      # 连接验证超时 5 秒
      validation-timeout: 5000
      connection-timeout: 30000
      minimum-idle: 2
      maximum-pool-size: 10

# 日志配置
logging:
  level:
    com.bigprime: DEBUG
    org.springframework.web: INFO
  file:
    name: ${BACKEND_HOME:${APP_HOME:.}/backend}/logs/bigprime-datasync.log

# Python KernelGateway配置
python:
  runtime-type: embedded
  kernel-gateway:
    port: 8866
    auto-start: true

# BigPrime自定义配置
bigprime:
  # 数据目录
  data:
    path: ${BACKEND_HOME:${APP_HOME:.}/backend}/data
  # SeaTunnel 文档路径（内置文档 MCP 工具使用）
  seatunnel:
    docs-path: docs/seatunnel-2.3.12
  # 本地文件上传目录（SeaTunnel LocalFile Source 使用）
  localfile:
    upload-dir: ${bigprime.data.path:${user.dir}/data}/uploadfile
  # SkyWalking配置
  skywalking:
    enabled: false
    agent-path: ${APP_HOME:./}/plugins/skywalking-agent/skywalking-agent.jar
